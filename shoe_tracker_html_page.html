<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shoe Tracker</title>
<style>
body {
  font-family: 'Segoe UI', Arial;
  background: linear-gradient(135deg, #1e1e2f, #2a2a40);
  color: white;
  margin: 0;
}

h1 {
  text-align: center;
  padding: 20px;
  font-size: 2.5rem;
}

.controls {
  text-align:center;
  margin-bottom:10px;
}

.controls button {
  width:auto;
  margin:5px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  border-radius: 16px;
  padding: 20px;
  transition: transform 0.2s, box-shadow 0.2s;
}

.card:hover {
  transform: translateY(-5px);
}

.name {
  font-size: 1.2rem;
  font-weight: bold;
  margin-bottom: 10px;
}

.stats {
  font-size: 0.9rem;
  margin: 6px 0;
}

button {
  margin-top: 12px;
  padding: 12px;
  width: 100%;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg, #4facfe, #00f2fe);
  color: black;
  font-weight: bold;
  cursor: pointer;
}

.highlight {
  outline: 2px solid orange;
}
</style>
</head>
<body>

<h1>👟 Shoe Tracker</h1>
<div class="controls">
  <button onclick="sortLeastWorn()">Sort Least Worn</button>
  <button onclick="pickRandom()">Pick For Today 🎲</button>
</div>
<div class="grid" id="grid"></div>

<script>
const initialShoes = [{"name": "Air Jordan 1 Low Travis Scott Medium Olive", "lastWorn": null, "wearCount": 0}, {"name": "Air Jordan 4 Travis Scott", "lastWorn": null, "wearCount": 0}, {"name": "Air Jordan 4 Undefeated", "lastWorn": null, "wearCount": 0}, {"name": "Air Jordan 1 UNC Reimagined", "lastWorn": null, "wearCount": 0}, {"name": "Air Jordan 1 Bred 85", "lastWorn": null, "wearCount": 0}, {"name": "Air Jordan 1 Phantom ", "lastWorn": null, "wearCount": 0}, {"name": "Air Jordan 1 Lost and Found", "lastWorn": null, "wearCount": 0}, {"name": "Air Jordan 13 Black Cat", "lastWorn": null, "wearCount": 0}, {"name": "Air Jordan 1 Fragment x Union LA", "lastWorn": null, "wearCount": 0}, {"name": "Nike Air Foamposite Galaxy", "lastWorn": null, "wearCount": 0}, {"name": "Off-White Vapormax Part 2", "lastWorn": null, "wearCount": 0}, {"name": "Off-White Nike Air Presto", "lastWorn": null, "wearCount": 0}, {"name": "Off-White Nike Hyperdunk", "lastWorn": null, "wearCount": 0}, {"name": "Nike SB Dunk HUF SF", "lastWorn": null, "wearCount": 0}, {"name": "Nike KD 4 The Real MVP", "lastWorn": null, "wearCount": 0}, {"name": "Nike Kobe 6 Dodgers ", "lastWorn": null, "wearCount": 0}, {"name": "Balenciaga Speed Trainer ", "lastWorn": null, "wearCount": 0}, {"name": "Nike Air Force 1 A Ma Maniere F&F", "lastWorn": null, "wearCount": 0}, {"name": "Nike Pegasus 41 Doernbecher", "lastWorn": null, "wearCount": 0}, {"name": "Nike ZoomX Invincible Run Flyknit 3 Oreo", "lastWorn": null, "wearCount": 0}, {"name": "Yeezy 350 V2 Zebra ", "lastWorn": null, "wearCount": 0}, {"name": "Yeezy 350 Pirate Black", "lastWorn": null, "wearCount": 0}, {"name": "Yeezy 350 Turtle Dove ", "lastWorn": null, "wearCount": 0}];

let shoes = JSON.parse(localStorage.getItem("shoeBase"));
if (!shoes || shoes.length === 0) {
  shoes = initialShoes;
}

function daysSince(dateStr) {
  if (!dateStr) return Infinity;
  const then = new Date(dateStr);
  const now = new Date();
  return Math.floor((now - then) / (1000*60*60*24));
}

function getColor(count) {
  if (count === 0) return "#444";
  if (count < 3) return "#2ecc71";
  if (count < 6) return "#f1c40f";
  return "#e74c3c";
}

function render() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  shoes.forEach((s, i) => {
    const div = document.createElement("div");
    div.className = "card";

    const last = s.lastWorn || "Never";
    const days = daysSince(s.lastWorn);

    if (days > 14) div.classList.add("highlight");

    div.style.background = getColor(s.wearCount);

    div.innerHTML = `
      <div class="name">${s.name}</div>
      <div class="stats">Last worn: ${last}</div>
      <div class="stats">Times worn: ${s.wearCount}</div>
      <div class="stats">${days === Infinity ? 'Never worn' : days + ' days ago'}</div>
      <button onclick="wear(${i})">Wear Today</button>
    `;

    grid.appendChild(div);
  });
}

function wear(i) {
  const today = new Date().toLocaleDateString();
  shoes[i].lastWorn = today;
  shoes[i].wearCount++;
  localStorage.setItem("shoeBase", JSON.stringify(shoes));
  render();
}

function sortLeastWorn() {
  shoes.sort((a,b)=>a.wearCount - b.wearCount);
  render();
}

function pickRandom() {
  const choice = shoes[Math.floor(Math.random()*shoes.length)];
  alert("Wear this today: " + choice.name);
}

render();
</script>

</body>
</html>
