  grid.innerHTML = "";

  shoes.forEach((shoe, index) => {
    const div = document.createElement("div");
    div.className = "shoe-card";

    if (index === selectedIndex) {
      div.classList.add("highlight");
    }

    div.innerHTML = `
      <img src="${shoe.image}" style="width:100%; border-radius:8px;">
      <div>${shoe.name}</div>
    `;

    grid.appendChild(div);
  });
}

function pickRandomShoe() {
  const randomIndex = Math.floor(Math.random() * shoes.length);
  const shoe = shoes[randomIndex];

  document.getElementById("randomResult").innerText =
    "Wear: " + shoe.name;

  render(randomIndex);
}

render();

</script>
</body>
</html>
