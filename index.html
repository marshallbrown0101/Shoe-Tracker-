<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shoe Logger</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;margin:0;background:#f5f7fa;color:#333;}
header{background:#111827;color:white;padding:16px;text-align:center;font-size:1.4rem;font-weight:600;}
.container{padding:16px;max-width:600px;margin:auto;}
.controls{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px;}
button,input[type=file]{flex:1;padding:12px;border:none;border-radius:10px;font-size:1rem;}
button{background:#2563eb;color:white;cursor:pointer;}
button.secondary{background:#10b981;}
button.sort{background:#8b5cf6;} /* NEW COLOR */

.shoe-card{position:relative;background:white;border-radius:14px;padding:12px;margin-bottom:14px;box-shadow:0 4px 10px rgba(0,0,0,0.05);display:flex;gap:12px;align-items:center;transition:transform 0.2s, box-shadow 0.3s;}
.shoe-card.highlight{box-shadow:0 0 0 3px #10b981;}
.shoe-card img{width:80px;height:80px;object-fit:cover;border-radius:10px;background:#eee;}
.shoe-info{flex:1;}
.shoe-name{font-weight:600;margin-bottom:6px;cursor:pointer;}
.meta{font-size:0.85rem;color:#666;}
.log-btn{margin-top:8px;padding:6px 10px;font-size:0.8rem;border-radius:8px;background:#111827;color:white;border:none;cursor:pointer;}

.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);display:none;align-items:center;justify-content:center;}
.modal-content{background:white;padding:20px;border-radius:14px;width:90%;max-width:400px;}
.modal input{width:100%;margin-bottom:10px;padding:10px;border-radius:8px;border:1px solid #ddd;}
.modal-actions{display:flex;gap:10px;}
.modal-actions button{flex:1;}

.calendar{margin-top:20px;background:white;padding:12px;border-radius:12px;}
.calendar h4{margin:0 0 10px 0;}
</style>
</head>
<body>
<header>Shoe Logger</header>
<div class="container">
<div class="controls">
<button onclick="addShoe()">Add Shoe</button>
<button class="secondary" onclick="pickRandom()">Random Pick</button>
<button class="sort" onclick="sortLeastWorn()">Sort Least Worn</button>
<input type="file" accept=".csv" onchange="importCSV(event)">
</div>
<div id="shoeList"></div>
<div id="calendar" class="calendar"></div>
</div>

<div id="modal" class="modal">
<div class="modal-content">
<h3>Edit Shoe</h3>
<input id="editName" placeholder="Shoe Name">
<input type="file" id="imagePicker">
<div class="modal-actions">
<button onclick="saveEdit()">Save</button>
<button onclick="deleteCurrent()" style="background:#dc2626;">Delete</button>
<button onclick="closeModal()" style="background:#9ca3af;">Cancel</button>
</div>
</div>
</div>

<script>
let shoes = JSON.parse(localStorage.getItem('shoes') || '[]');
let currentEditIndex = null;
let highlightedIndex = null;

function save(){localStorage.setItem('shoes', JSON.stringify(shoes));}

function render(){
const list=document.getElementById('shoeList');
list.innerHTML='';

shoes.forEach((shoe,index)=>{
const isHighlighted = index===highlightedIndex;
const card=document.createElement('div');
card.className='shoe-card';
if(isHighlighted) card.classList.add('highlight');
if(isHighlighted) setTimeout(()=>card.scrollIntoView({behavior:'smooth',block:'center'}),100);

let startX=0;
card.addEventListener('touchstart',e=>{startX=e.touches[0].clientX});
card.addEventListener('touchmove',e=>{
let dx=e.touches[0].clientX-startX;
card.style.transform=`translateX(${dx}px)`;
});
card.addEventListener('touchend',e=>{
let dx=e.changedTouches[0].clientX-startX;
if(dx>100) openModal(index);
else if(dx<-100){
if(confirm('Delete this shoe?')){
shoes.splice(index,1);
save();render();
}
}
card.style.transform='';
});

const img=document.createElement('img');
img.src=shoe.image||`https://source.unsplash.com/featured/?${encodeURIComponent(shoe.name)},shoes`;
img.onerror=()=>{img.src='https://source.unsplash.com/featured/?sneakers'};

const info=document.createElement('div');
info.className='shoe-info';

info.innerHTML=`
<div class="shoe-name" onclick="inlineEditName(${index})">${shoe.name}</div>
<div class="meta">Worn: ${shoe.count || 0} times</div>
<div class="meta">Last worn: ${shoe.lastWorn||'Never'}</div>
<button class="log-btn" onclick="logWear(${index})">Log Wear</button>
<button class="log-btn" style="background:#f59e0b;margin-left:6px;" onclick="openModal(${index})">Edit</button>
`;

card.appendChild(img);
card.appendChild(info);
list.appendChild(card);
});

renderCalendar();
}

function renderCalendar(){
const cal=document.getElementById('calendar');
cal.innerHTML='<h4>Wear History</h4>';

const entries = shoes
  .filter(s => s.lastWorn)
  .sort((a,b)=> new Date(b.lastWorn) - new Date(a.lastWorn));

entries.forEach(s => {
  cal.innerHTML += `<div>${s.name} — ${s.lastWorn}</div>`;
});
}

function inlineEditName(index){
const newName=prompt('Edit name:', shoes[index].name);
if(newName){shoes[index].name=newName;save();render();}
}

function openModal(index){
currentEditIndex=index;
document.getElementById('editName').value=shoes[index].name;
document.getElementById('modal').style.display='flex';
}

function closeModal(){document.getElementById('modal').style.display='none';}

function saveEdit(){
const name=document.getElementById('editName').value;
const file=document.getElementById('imagePicker').files[0];

if(name) shoes[currentEditIndex].name=name;

if(file){
const reader=new FileReader();
reader.onload=e=>{
shoes[currentEditIndex].image=e.target.result;
save();render();
};
reader.readAsDataURL(file);
}else{
save();render();
}

closeModal();
}

function deleteCurrent(){
if(confirm('Delete this shoe?')){
shoes.splice(currentEditIndex,1);
save();render();closeModal();
}
}

function addShoe(){
const name=prompt('Enter shoe name:');
if(!name)return;
shoes.push({name,image:'',count:0,lastWorn:null});
save();render();
}

function logWear(index){
if(typeof shoes[index].count !== 'number') shoes[index].count = 0;
const today=new Date().toLocaleDateString();
shoes[index].count++;
shoes[index].lastWorn=today;
save();render();
}

function pickRandom(){
if(shoes.length===0){alert('No shoes added yet');return;}
highlightedIndex = Math.floor(Math.random()*shoes.length);
render();
}

function sortLeastWorn(){
shoes.sort((a,b)=>a.count-b.count);
save();render();
}

function importCSV(event){
const file=event.target.files[0];
if(!file)return;
const reader=new FileReader();
reader.onload=function(e){
const text=e.target.result;
const rows=text.split('\n').map(r=>r.split(','));
const headers=rows[0].map(h=>h.trim().toLowerCase());

for(let i=1;i<rows.length;i++){
const row=rows[i];
if(row.length<1)continue;
const obj={name:'',image:'',count:0,lastWorn:null};

headers.forEach((h,idx)=>{
const val=row[idx]?.trim();
if(!val)return;
if(h.includes('name')) obj.name=val;
if(h.includes('image')) obj.image=val;
if(h.includes('count')||h.includes('wear')) obj.count=parseInt(val)||0;
if(h.includes('last')) obj.lastWorn=val;
});

if(obj.name) shoes.push(obj);
}

save();render();alert('CSV Imported Successfully');
};
reader.readAsText(file);
}

render();
</script>
</body>
</html>
