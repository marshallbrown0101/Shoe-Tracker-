<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Shoe Logger Pro</title>

<style>
:root{
  --bg:#f2f2f7;
  --card:#ffffff;
  --text:#1c1c1e;
  --sub:#8e8e93;
  --btn:#e5e5ea;
  --btnText:#000;
  --accent:#5856d6;
  --danger:#ff3b30;
  --shadow: 0 4px 20px rgba(0,0,0,0.06);
}
body.dark{
  --bg:#000000;
  --card:#1c1c1e;
  --text:#ffffff;
  --sub:#a1a1aa;
  --btn:#2c2c2e;
  --btnText:#fff;
  --shadow: 0 4px 20px rgba(0,0,0,0.4);
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
  background:var(--bg);
  color:var(--text);
  transition:background 0.4s ease, color 0.4s ease;
}

.header-wrapper {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(242, 242, 247, 0.8);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 20px 16px;
    text-align: center;
    border-bottom: 1px solid rgba(0,0,0,0.05);
}
body.dark .header-wrapper { background: rgba(0,0,0,0.7); border-bottom: 1px solid rgba(255,255,255,0.1); }

.logo{font-weight:800; font-size:24px; letter-spacing:-0.5px; display: block;}

.container{padding:20px 16px 100px 16px; max-width:600px; margin:auto;}

.search-box{
    width: 100%;
    padding: 14px 18px;
    border-radius: 14px;
    border: 1px solid rgba(0,0,0,0.05);
    background: var(--card);
    color: var(--text);
    margin-bottom: 16px;
    font-size: 16px;
    box-shadow: var(--shadow);
    outline: none;
}

.controls{display:grid; grid-template-columns:repeat(4, 1fr); gap:10px; margin-bottom:24px;}
.controls button{
    background:var(--btn); 
    color:var(--btnText); 
    border:none; 
    padding:12px 0; 
    border-radius:12px; 
    font-size:10px; 
    font-weight:700; 
    text-transform: uppercase;
    letter-spacing: 0.5px;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.controls button:active { transform: scale(0.92); }

/* Dark Mode Button Specific */
#darkBtn.is-dark {
    background: #ffcc00; /* Sun-like gold */
    color: #000;
}

.shoe{
  background:var(--card);
  padding:16px;
  border-radius:24px;
  margin-bottom:16px;
  display:flex;
  gap:16px;
  align-items:center;
  position:relative;
  box-shadow: var(--shadow);
}

.shoe img{width:90px; height:90px; border-radius:18px; object-fit:cover; background:var(--btn);}

.shoe-info{flex:1;}
.shoe-name{font-weight:700; font-size:18px; margin-bottom:4px; line-height: 1.2;}
.shoe-meta{font-size:13px; color:var(--sub); margin-bottom:12px;}

.action-row{display:flex; gap:8px; align-items: center;}
.log-btn{
    flex: 1;
    padding: 12px; 
    border:none; 
    border-radius:14px; 
    background:var(--accent); 
    color:#fff; 
    font-weight:700; 
    font-size:14px;
}
.del-btn{
    width: 38px;
    height: 38px;
    border:none; 
    border-radius:12px; 
    background: var(--btn);
    color:var(--danger); 
    font-size:18px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.custom-file-upload {
    display: block;
    width: 100%;
    padding: 14px;
    background: var(--btn);
    color: var(--btnText);
    border-radius: 12px;
    text-align: center;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    margin-bottom: 20px;
    border: 2px dashed rgba(0,0,0,0.1);
}
body.dark .custom-file-upload { border-color: rgba(255,255,255,0.1); }

.toast {
    position: fixed;
    top: -100px;
    left: 50%;
    transform: translateX(-50%);
    background: #1c1c1e;
    color: white;
    padding: 14px 28px;
    border-radius: 40px;
    font-weight: 600;
    z-index: 10000;
    box-shadow: 0 15px 30px rgba(0,0,0,0.3);
    transition: top 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.toast.show { top: 40px; }

.modal{position:fixed; inset:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(10px); display:none; align-items:flex-end; z-index:1000;}
.modal-content{background:var(--card); width:100%; padding:30px; border-radius:32px 32px 0 0; max-height: 90vh; overflow-y: auto;}

.primary-btn{width:100%; padding:18px; border:none; border-radius:18px; background:var(--accent); color:#fff; font-weight:700; font-size:17px;}

input[type="text"], input[type="number"] {
    width: 100%;
    padding: 16px;
    border-radius: 12px;
    border: 1px solid rgba(0,0,0,0.1);
    background: var(--bg);
    color: var(--text);
    margin-bottom: 12px;
    font-size: 16px;
}

.divider {
    display: flex;
    align-items: center;
    text-align: center;
    color: var(--sub);
    font-size: 11px;
    font-weight: 800;
    margin: 24px 0;
    text-transform: uppercase;
}
.divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid rgba(0,0,0,0.1); }
.divider:not(:empty)::before { margin-right: 1em; }
.divider:not(:empty)::after { margin-left: 1em; }

</style>
</head>
<body>

<div id="toast" class="toast">Logged Successfully</div>

<div class="header-wrapper">
    <span class="logo">Shoe Logger</span>
</div>

<div class="container">
    <input type="text" class="search-box" id="searchInput" placeholder="Search your collection..." oninput="render()">

    <div class="controls">
        <button onclick="openModal('addModal')">Add Pair</button>
        <button onclick="randomPick()">Random Picker</button>
        <button id="darkBtn" onclick="toggleDark()">🌙 Dark Mode</button>
        <button onclick="openHistory()">History</button>
    </div>

    <div id="list"></div>
</div>

<div id="addModal" class="modal" onclick="if(event.target==this)closeModal('addModal')">
    <div class="modal-content">
        <h3 style="margin-top:0">Add New Pair</h3>
        <input id="newName" placeholder="Name (e.g. Jordan 1 High)">
        <input id="newCount" type="number" placeholder="Starting wear count">
        
        <label for="newImage" class="custom-file-upload" id="fileLabel">
            📸 Upload Shoe Photo
        </label>
        <input type="file" id="newImage" accept="image/*" capture="environment" style="display:none" onchange="updateFileName()">
        
        <button class="primary-btn" onclick="saveShoe()">Save to Collection</button>
        
        <div class="divider">OR BULK IMPORT</div>
        
        <input type="file" id="csvFile" accept=".csv" style="margin-bottom:10px">
        <button class="primary-btn" style="background:var(--btn); color:var(--btnText)" onclick="importCSV()">Import CSV File</button>
    </div>
</div>

<div id="randomModal" class="modal" onclick="if(event.target==this)closeModal('randomModal')">
    <div class="modal-content" style="text-align:center">
        <h3 style="margin-top:0">Wear these today!</h3>
        <img id="randomImage" style="width:100%; max-height:300px; object-fit:cover; border-radius:24px; margin-bottom:20px; box-shadow:var(--shadow)">
        <h2 id="randomResult" style="margin:10px 0"></h2>
        <button class="primary-btn" onclick="closeModal('randomModal')">Awesome</button>
    </div>
</div>

<div id="historyModal" class="modal" onclick="if(event.target==this)closeModal('historyModal')">
    <div class="modal-content">
        <h3 style="margin-top:0">Recent Activity</h3>
        <div id="historyList" style="max-height:50vh; overflow-y:auto; margin-bottom:20px"></div>
        <button class="primary-btn" onclick="closeModal('historyModal')">Done</button>
    </div>
</div>

<script>
let shoes = JSON.parse(localStorage.getItem('shoes') || '[]');

function save(){ localStorage.setItem('shoes', JSON.stringify(shoes)); }

function updateFileName() {
    const input = document.getElementById('newImage');
    const label = document.getElementById('fileLabel');
    if(input.files.length > 0) {
        label.innerText = "✅ Image Selected: " + input.files[0].name;
        label.style.borderColor = "var(--accent)";
        label.style.color = "var(--accent)";
    }
}

function render() {
    const list = document.getElementById('list');
    const searchTerm = document.getElementById('searchInput').value.toLowerCase();
    list.innerHTML = '';
    const filtered = shoes.filter(s => s.name.toLowerCase().includes(searchTerm));

    if(filtered.length === 0) {
        list.innerHTML = `<div style="text-align:center; padding:60px 20px; color:var(--sub)">No shoes found. Add your first pair!</div>`;
        return;
    }

    filtered.forEach((s, i) => {
        const index = shoes.indexOf(s);
        const div = document.createElement('div');
        div.className = 'shoe';
        const imgSrc = s.image || 'https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&w=300&q=80';

        div.innerHTML = `
            <img src="${imgSrc}">
            <div class="shoe-info">
                <div class="shoe-name">${s.name}</div>
                <div class="shoe-meta">Worn ${s.count || 0} times • ${s.lastWorn || 'New'}</div>
                <div class="action-row">
                    <button class="log-btn" onclick="logWear(${index}, this)">LOG WEAR</button>
                    <button class="del-btn" onclick="deleteShoe(${index})">✕</button>
                </div>
            </div>`;
        list.appendChild(div);
    });
}

async function saveShoe() {
    const name = document.getElementById('newName').value;
    const count = parseInt(document.getElementById('newCount').value) || 0;
    const file = document.getElementById('newImage').files[0];
    if(!name) return alert("Please enter a name");
    let imageData = "";
    if(file) imageData = await compressImage(file);
    shoes.push({ name, count, lastWorn: null, image: imageData });
    finishImport('addModal');
}

function logWear(i, btn) {
    shoes[i].count = (shoes[i].count || 0) + 1;
    shoes[i].lastWorn = new Date().toLocaleDateString('en-US', { month:'short', day:'numeric' });
    save();
    showToast(`${shoes[i].name} Logged!`);
    render();
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.innerText = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
}

function deleteShoe(i) {
    if(confirm("Delete this pair?")) { shoes.splice(i, 1); save(); render(); }
}

function randomPick() {
    if(shoes.length === 0) return alert("Add shoes first");
    const s = shoes[Math.floor(Math.random() * shoes.length)];
    document.getElementById('randomResult').innerText = s.name;
    document.getElementById('randomImage').src = s.image || 'https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&w=300&q=80';
    openModal('randomModal');
}

function importCSV() {
    const file = document.getElementById('csvFile').files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        const rows = e.target.result.split('\n');
        const headers = rows[0].split(',').map(h => h.trim());
        for (let i = 1; i < rows.length; i++) {
            if (!rows[i].trim()) continue;
            const values = rows[i].split(',').map(v => v.trim());
            const shoeObj = {};
            headers.forEach((h, idx) => {
                if (h === 'Name') shoeObj.name = values[idx];
                if (h === 'Image') shoeObj.image = values[idx];
                if (h === 'WearCount') shoeObj.count = parseInt(values[idx]) || 0;
            });
            if (shoeObj.name) shoes.push(shoeObj);
        }
        finishImport('addModal');
    };
    reader.readAsText(file);
}

function openHistory() {
    const list = document.getElementById('historyList');
    list.innerHTML = '';
    const sorted = [...shoes].filter(s => s.lastWorn).sort((a,b) => new Date(b.lastWorn) - new Date(a.lastWorn));
    if(sorted.length === 0) list.innerHTML = '<p style="text-align:center; color:var(--sub)">No recent activity</p>';
    sorted.forEach(s => {
        list.innerHTML += `<div style="display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid rgba(0,0,0,0.05)"><strong>${s.name}</strong> <span>${s.lastWorn}</span></div>`;
    });
    openModal('historyModal');
}

function compressImage(file) {
    return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX = 400;
                const scale = MAX / Math.max(img.width, img.height);
                canvas.width = img.width * scale;
                canvas.height = img.height * scale;
                canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                resolve(canvas.toDataURL('image/jpeg', 0.8));
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    });
}

function toggleDark() { 
    const isDark = document.body.classList.toggle('dark'); 
    const btn = document.getElementById('darkBtn');
    
    if (isDark) {
        btn.innerHTML = "☀️ Light Mode";
        btn.classList.add('is-dark');
    } else {
        btn.innerHTML = "🌙 Dark Mode";
        btn.classList.remove('is-dark');
    }
}

function openModal(id) { document.getElementById(id).style.display = 'flex'; }
function closeModal(id) { document.getElementById(id).style.display = 'none'; }
function finishImport(m) { 
    save(); 
    render(); 
    closeModal(m); 
    document.getElementById('fileLabel').innerText = "📸 Upload Shoe Photo";
    document.querySelectorAll('input').forEach(i => i.value=''); 
}

render();
</script>
</body>
</html>
