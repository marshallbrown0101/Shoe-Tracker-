<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Shoe Logger</title>

<style>
:root{
  --bg:#f2f2f7;
  --card:#ffffff;
  --text:#111111;
  --sub:#6b7280;
  --btn:#e5e7eb;
  --btnText:#111;
  --accent:#4f46e5;
}
body.dark{
  --bg:#000;
  --card:#1c1c1e;
  --text:#fff;
  --sub:#9ca3af;
  --btn:#2c2c2e;
  --btnText:#fff;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
  background:var(--bg);
  color:var(--text);
  transition:background 0.4s ease, color 0.4s ease;
}

.container{padding:16px;max-width:600px;margin:auto;padding-bottom:40px;}
.header{text-align:center;padding:20px 0;}
.logo{font-weight:700;font-size:26px;}

.controls{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.controls button{background:var(--btn);color:var(--btnText);border:none;padding:11px;border-radius:14px;font-size:14px;transition:all 0.25s ease;}

/* STRONG DARK MODE BORDER (clean + very visible glow) */
.dark-active{
  border:3px solid var(--accent);
  font-weight:700;
  box-shadow:
    0 0 0 3px rgba(79,70,229,0.3),
    0 0 12px rgba(79,70,229,0.6),
    0 0 20px rgba(79,70,229,0.5);
}

button:active{transform:scale(0.96);}

.shoe{
  background:var(--card);
  padding:12px;
  border-radius:18px;
  margin-bottom:10px;
  display:flex;
  gap:12px;
  align-items:center;
  position:relative;
}

/* CLEAN RING ANIMATION (no flicker) */
.shoe.ring::after{
  content:"";
  position:absolute;
  inset:0;
  border-radius:18px;
  border:3px solid var(--accent);
  opacity:0;
  transform:scale(1);
  animation:ringSmooth 0.6s ease-out;
}

@keyframes ringSmooth{
  0%{opacity:0.9; transform:scale(1);} 
  100%{opacity:0; transform:scale(1.12);} 
}

@keyframes ringFlash{
  0%{opacity:0; transform:scale(0.9);} 
  50%{opacity:1; transform:scale(1.05);} 
  100%{opacity:0; transform:scale(1.1);} 
}

.shoe.log-animate{animation:popLog 0.4s ease;}
@keyframes popLog{50%{transform:scale(1.08);}}

.shoe img{width:64px;height:64px;border-radius:12px;object-fit:cover;}

.log-btn{width:100%;margin-top:6px;padding:9px;border:none;border-radius:10px;background:var(--accent);color:#fff;}

/* BIGGER CONFETTI */
.confetti{
  position:fixed;
  width:10px;height:10px;
  top:0;
  animation:fall 1.2s linear forwards;
}
@keyframes fall{
  to{transform:translateY(100vh) rotate(720deg);opacity:0;}
}

.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.25);backdrop-filter:blur(6px);display:none;align-items:flex-end;}
.modal-content{background:var(--card);width:100%;padding:20px;border-radius:20px 20px 0 0;animation:springUp 0.5s cubic-bezier(.34,1.56,.64,1);position:relative;}

@keyframes springUp{0%{transform:translateY(100%);}60%{transform:translateY(-8%);}100%{transform:translateY(0);}}

.close-x{position:absolute;top:14px;right:18px;font-size:22px;cursor:pointer;transition:transform 0.25s ease, opacity 0.25s ease;}
.close-x:active{transform:rotate(90deg) scale(0.85);opacity:0.6;}

.modal.closing .modal-content{animation:slideDown 0.3s ease forwards;}
@keyframes slideDown{to{transform:translateY(100%);opacity:0;}}

input{width:100%;margin-bottom:10px;padding:13px;border-radius:12px;border:1px solid #ddd;}

.history-item{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(0,0,0,0.05);} 

.random-img{width:100%;max-width:200px;border-radius:14px;margin:10px auto;display:block;}

</style>
</head>
<body>

<div class="header"><div class="logo">Shoe Logger</div></div>

<div class="container">
<div class="controls">
<button onclick="openAdd()">Add</button>
<button onclick="randomPick()">Random</button>
<button id="darkBtn" onclick="toggleDark()">Dark</button>
<button onclick="openHistory()">History</button>
</div>
<div id="list"></div>
</div>

<!-- ADD MODAL -->
<div id="modal" class="modal"><div class="modal-content">
<div class="close-x" onclick="closeModal('modal')">×</div>
<h3>Add Shoe</h3>
<input id="name" placeholder="Shoe Name">
<input id="count" type="number" placeholder="Times worn">
<input type="file" id="image">
<button onclick="saveShoe()">Save</button>
</div></div>

<!-- RANDOM MODAL -->
<div id="randomModal" class="modal"><div class="modal-content">
<div class="close-x" onclick="closeModal('randomModal')">×</div>
<h3>Today's Pick</h3>
<div id="randomResult"></div>
<img id="randomImage" class="random-img">
</div></div>

<!-- HISTORY MODAL -->
<div id="historyModal" class="modal"><div class="modal-content">
<div class="close-x" onclick="closeModal('historyModal')">×</div>
<h3>History</h3>
<div id="historyList"></div>
</div></div>

<script>
let shoes = JSON.parse(localStorage.getItem('shoes') || '[]');

function save(){localStorage.setItem('shoes', JSON.stringify(shoes));}

function render(){
const list=document.getElementById('list');
list.innerHTML='';

shoes.forEach(function(s,i){
const div=document.createElement('div');
div.className='shoe';

const last = s.lastWorn || 'Never';
const imgSrc = s.image || 'https://source.unsplash.com/featured/?sneakers';

div.innerHTML=`
<img src="${imgSrc}">
<div style="flex:1">
<div>${s.name}</div>
<div style="font-size:12px;color:var(--sub)">Worn: ${s.count||0}</div>
<div style="font-size:12px;color:var(--sub)">Last: ${last}</div>
<button class="log-btn" onclick="logWear(${i}, this)">Log Wear</button>
</div>`;

list.appendChild(div);
});
}

function logWear(i, btn){
shoes[i].count=(shoes[i].count||0)+1;
shoes[i].lastWorn=new Date().toLocaleDateString();
save();

const card = btn.closest('.shoe');
card.classList.add('log-animate');
card.classList.add('ring');

createConfetti();

setTimeout(()=>{
card.classList.remove('log-animate');
card.classList.remove('ring');
render();
},600);
}

function createConfetti(){
for(let i=0;i<50;i++){
const c=document.createElement('div');
c.className='confetti';
c.style.left=Math.random()*100+'vw';
c.style.background=`hsl(${Math.random()*360},100%,50%)`;
document.body.appendChild(c);
setTimeout(()=>c.remove(),1200);
}
}

function toggleDark(){
document.body.classList.toggle('dark');
document.getElementById('darkBtn').classList.toggle('dark-active');
}

function closeModal(id){
const modal=document.getElementById(id);
modal.classList.add('closing');
setTimeout(()=>{
  modal.style.display='none';
  modal.classList.remove('closing');
},300);
}

function openAdd(){document.getElementById('modal').style.display='flex';}

function saveShoe(){
const name=document.getElementById('name').value;
const count=parseInt(document.getElementById('count').value)||0;
const file=document.getElementById('image').files[0];

const newShoe={name,count,lastWorn:null,image:''};

if(file){
const reader=new FileReader();
reader.onload=function(e){
newShoe.image=e.target.result;
shoes.push(newShoe);
save();
render();
};
reader.readAsDataURL(file);
}else{
shoes.push(newShoe);
save();
render();
}

closeModal('modal');
}

function randomPick(){
if(shoes.length===0){alert('No shoes added');return;}
const shoe=shoes[Math.floor(Math.random()*shoes.length)];
document.getElementById('randomResult').innerText=shoe.name;
document.getElementById('randomImage').src=shoe.image || 'https://source.unsplash.com/featured/?sneakers';
document.getElementById('randomModal').style.display='flex';
}

function openHistory(){
const list=document.getElementById('historyList');
list.innerHTML='';

const sorted = shoes.filter(s=>s.lastWorn).sort((a,b)=>new Date(b.lastWorn)-new Date(a.lastWorn));

sorted.forEach(s=>{
const row=document.createElement('div');
row.className='history-item';
row.innerHTML=`<div>${s.name}</div><div>${s.lastWorn}</div>`;
list.appendChild(row);
});

document.getElementById('historyModal').style.display='flex';
}

render();
</script>
</body>
</html>
